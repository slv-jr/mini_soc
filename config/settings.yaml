# ============================================================
# config/settings.yaml — configuration centrale du Mini-SOC
# Les SECRETS (clés API, mots de passe) sont lus depuis l'environnement
# (variables du .env Docker / systemd), jamais stockés ici.
# ============================================================

# Topologie réseau : AUCUNE valeur en dur. Tout vient de l'environnement
# (docker/.env généré par Ansible, qui auto-détecte interface + passerelle).
# Défaut vide = non configuré -> le code ignore la valeur au lieu de pointer
# une IP arbitraire (ex: une passerelle vide n'est pas sondée).
network:
  interface: "${SOC_IFACE:-eth0}"   # seul défaut conservé (nom d'interface générique)
  subnet: "${SOC_SUBNET:-}"
  gateway: "${SOC_GATEWAY:-}"       # passerelle (jamais bloquée)

# ── Sondes actives (conservées de la v1) ────────────────────────────────────
# Les cibles à host vide sont ignorées au démarrage (voir collector/probe.py).
probe:
  targets:
    - host: "${SOC_GATEWAY:-}"
      name: "Gateway"
      check_http: false
    - host: "${PROBE_DNS1:-8.8.8.8}"     # DNS publics : cibles de disponibilité, surchargeables
      name: "DNS primaire"
      check_http: false
    - host: "${PROBE_DNS2:-1.1.1.1}"
      name: "DNS secondaire"
      check_http: false
  interval_seconds: 30
  http_timeout: 5

# ── Bus Redis ────────────────────────────────────────────────────────────────
redis:
  host: "${REDIS_HOST:-localhost}"
  port: 6379
  db: 0
  queues:
    raw_events: "pisoc:raw"        # alimenté par Vector (Suricata + Zeek normalisés)
    alerts: "pisoc:alerts"
    topology: "pisoc:topology"

# ── Métriques time-series ────────────────────────────────────────────────────
influxdb:
  url: "${INFLUXDB_URL:-http://localhost:8086}"
  token: "${INFLUXDB_TOKEN}"       # secret : uniquement via l'environnement
  org: "${INFLUXDB_ORG:-minisoc}"
  bucket: "${INFLUXDB_BUCKET:-network_metrics}"

sqlite:
  path: "data/events.db"

# ── MITRE ATT&CK ──────────────────────────────────────────────────────────────
mitre:
  enabled: true
  # Chemin du mapping SID/règle -> technique (généré/maintenu, voir detection/mitre.py)
  mapping_file: "config/mitre_map.yaml"

# ── Enrichissement threat intel ──────────────────────────────────────────────
enrichment:
  enabled: true
  cache_ttl_seconds: 86400         # 24h de cache Redis par IP
  geoip:
    enabled: true
    db_path: "data/geoip/GeoLite2-City.mmdb"
  abuseipdb:
    enabled: true                  # nécessite ABUSEIPDB_API_KEY dans l'env
    min_confidence: 50             # score AbuseIPDB à partir duquel on tague "malicious"
  otx:
    enabled: false                 # nécessite OTX_API_KEY dans l'env

# ── Corrélation (chaînes MITRE multi-étapes) ─────────────────────────────────
detection:
  correlation:
    context_ttl_seconds: 600       # un contexte d'attaque expire après 10 min
  # Détection statistique d'anomalie : archivée (examples/anomaly_zscore.py), OFF.
  anomaly:
    enabled: false
    window_size: 100
    z_score_threshold: 3.0

# ── Wazuh (SIEM + active response) ───────────────────────────────────────────
wazuh:
  api_url: "${WAZUH_API_URL:-https://localhost:55000}"
  api_user: "${WAZUH_API_USERNAME:-wazuh-wui}"   # mot de passe via WAZUH_API_PASSWORD (env)
  verify_ssl: false                # certificat auto-signé de la stack : vérif désactivée
  dashboard_url: "${WAZUH_DASHBOARD_URL:-https://localhost:5601}"

# ── Alerting multi-canal ──────────────────────────────────────────────────────
alerting:
  slack:
    enabled: false                 # webhook via SLACK_WEBHOOK_URL (env)
    min_severity: "medium"
  telegram:
    enabled: false                 # token/chat via TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID (env)
    min_severity: "high"
  webhook:
    enabled: false
    url: ""
    min_severity: "high"
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from_addr: ""
    to_addrs: []
    min_severity: "high"           # username/password via env SMTP_USER / SMTP_PASSWORD

# ── SOAR / réponse automatique ───────────────────────────────────────────────
responder:
  auto_block: false                # passer à true avec précaution
  prefer_wazuh_ar: true            # privilégier l'active-response Wazuh, fallback nftables local
  block_duration_seconds: 3600
  min_severity: "high"
  whitelist_ips:
    - "127.0.0.1"
    - "${SOC_GATEWAY:-}"   # la passerelle n'est jamais bloquée (vide = ignorée)

# ── Dashboard topologie ──────────────────────────────────────────────────────
dashboard:
  # 0.0.0.0 par défaut : requis pour que le manager Wazuh conteneurisé atteigne
  # le webhook via host.docker.internal. Les actions sensibles (POST) sont
  # protégées par MINISOC_API_TOKEN — À DÉFINIR dès que l'hôte est sur un LAN.
  flask_host: "${DASHBOARD_HOST:-0.0.0.0}"
  flask_port: 5000
  arp_scan_interval: 60
  # Origines autorisées pour le CORS (séparées par des virgules). '*' = toutes
  # (déconseillé). Par défaut : uniquement l'accès local.
  cors_origins: "${DASHBOARD_CORS_ORIGINS:-http://localhost:5000,http://127.0.0.1:5000}"
  # Jeton partagé exigé sur les endpoints qui modifient l'état (POST). Vide =
  # endpoints ouverts (uniquement acceptable si flask_host reste en loopback).
  api_token: "${MINISOC_API_TOKEN:-}"

# ── Journalisation ────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/minisoc.log"
  max_bytes: 10485760
  backup_count: 3
