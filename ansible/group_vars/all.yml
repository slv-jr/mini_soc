---
# ── Cible de déploiement ────────────────────────────────────────────────────
minisoc_dir: /opt/mini-soc
minisoc_user: "{{ ansible_facts['user_id'] }}"

# ── Réseau surveillé ────────────────────────────────────────────────────────
# Laisser vide pour auto-détecter (via ansible_facts.default_ipv4).
soc_iface: ""          # ex: enp19s0 ; vide = interface par défaut détectée
soc_subnet: ""         # ex: 192.168.1.0/24 ; vide = sous-réseau détecté
soc_gateway: ""        # vide = passerelle par défaut détectée

# ── Exposition du dashboard Mini-SOC ────────────────────────────────────────
# 0.0.0.0 requis pour que le manager Wazuh (conteneur) atteigne le webhook.
# Les actions sensibles sont protégées par un token d'API généré plus bas.
dashboard_host: "0.0.0.0"
dashboard_cors_origins: "http://localhost:5000,http://127.0.0.1:5000"

# ── Profils Docker à activer (core toujours actif) ──────────────────────────
# Options : sensors, siem, lab. Adapter à la RAM disponible.
soc_profiles:
  - sensors
  - siem

# ── Réglage mémoire OpenSearch (indexer Wazuh) ──────────────────────────────
# 512m pour une machine 4 Go ; passer à 1g si >= 8 Go de RAM.
opensearch_heap: "512m"

# ── Threat intel ─────────────────────────────────────────────────────────────
# Clé de licence MaxMind pour télécharger GeoLite2 (optionnel).
maxmind_license_key: ""
abuseipdb_api_key: ""
otx_api_key: ""

# ── Alerting (optionnel) ─────────────────────────────────────────────────────
slack_webhook_url: ""
telegram_bot_token: ""
telegram_chat_id: ""

# ── Wazuh ────────────────────────────────────────────────────────────────────
install_wazuh_agent: true
wazuh_agent_version: "4.14.0-1"
wazuh_manager_ip: "127.0.0.1"
