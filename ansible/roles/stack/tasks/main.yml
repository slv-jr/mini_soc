---
- name: Construire les arguments de profils Docker
  ansible.builtin.set_fact:
    profile_args: "{{ soc_profiles | map('regex_replace', '^(.*)$', '--profile \\1') | join(' ') }}"

- name: Générer les certificats SSL Wazuh (une seule fois)
  ansible.builtin.command:
    cmd: docker compose -f generate-certs.yml run --rm generator
    chdir: "{{ minisoc_dir }}/docker"
    creates: "{{ minisoc_dir }}/docker/wazuh/config/certs/root-ca.pem"
  when: "'siem' in soc_profiles"

- name: Démarrer la stack Mini-SOC ({{ profile_args }})
  ansible.builtin.command:
    cmd: "docker compose {{ profile_args }} up -d"
    chdir: "{{ minisoc_dir }}/docker"
  register: compose_up
  changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr"

# Le wrapper vit dans la couche éphémère du conteneur : on ne l'(re)installe
# que s'il manque (première install ou conteneur recréé). Surtout, on ne
# redémarre le manager QUE dans ce cas — un `docker restart` à chaque run
# coupait authd juste avant l'enrôlement de l'agent (SSL error / eof).
- name: Installer le wrapper d'intégration custom-minisoc dans le manager
  ansible.builtin.shell: |
    docker exec minisoc-wazuh-manager sh -c '
      test -x /var/ossec/integrations/custom-minisoc && exit 9
      printf "#!/bin/sh\nexec /var/ossec/framework/python/bin/python3 /var/ossec/integrations/custom-minisoc.py \"$@\"\n" > /var/ossec/integrations/custom-minisoc &&
      chmod 750 /var/ossec/integrations/custom-minisoc /var/ossec/integrations/custom-minisoc.py &&
      chown root:wazuh /var/ossec/integrations/custom-minisoc /var/ossec/integrations/custom-minisoc.py'
  register: integ_wrapper
  changed_when: integ_wrapper.rc == 0
  failed_when: integ_wrapper.rc not in [0, 9]
  when: "'siem' in soc_profiles"

- name: Redémarrer le manager uniquement si le wrapper vient d'être (re)créé
  ansible.builtin.command: docker restart minisoc-wazuh-manager
  when:
    - "'siem' in soc_profiles"
    - integ_wrapper is changed

# Un ossec.conf / une règle invalide fait avorter tout `wazuh-control start`
# (tous les démons restent à terre, y compris authd sur 1515). On teste la config
# tout de suite pour remonter l'erreur RÉELLE ici, plutôt qu'une obscure erreur
# SSL côté agent plusieurs minutes plus tard.
- name: Vérifier la validité de la configuration Wazuh du manager (règles/décodeurs)
  ansible.builtin.command:
    cmd: docker exec minisoc-wazuh-manager /var/ossec/bin/wazuh-analysisd -t
  register: wazuh_cfg_test
  changed_when: false
  retries: 12
  delay: 5
  until: wazuh_cfg_test.rc == 0
  failed_when: wazuh_cfg_test.rc != 0
  when: "'siem' in soc_profiles"

- name: Attendre que le dashboard Flask réponde (si moteur démarré séparément)
  ansible.builtin.uri:
    url: "http://localhost:5000/api/status"
    status_code: 200
  register: dash_health
  retries: 5
  delay: 5
  until: dash_health.status == 200
  ignore_errors: true

- name: Récapitulatif d'accès
  ansible.builtin.debug:
    msg:
      - "Dashboard Mini-SOC : http://{{ ansible_facts['default_ipv4']['address'] | default('localhost') }}:5000"
      - "Grafana            : http://{{ ansible_facts['default_ipv4']['address'] | default('localhost') }}:3000"
      - "Wazuh dashboard    : https://{{ ansible_facts['default_ipv4']['address'] | default('localhost') }}:5601"
      - "Secrets générés dans {{ minisoc_dir }}/docker/.env"
      - "Démarrer le moteur Python : sudo systemctl start minisoc"
