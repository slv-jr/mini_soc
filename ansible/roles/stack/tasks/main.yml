---
- name: Construire les arguments de profils Docker
  ansible.builtin.set_fact:
    profile_args: "{{ soc_profiles | map('regex_replace', '^(.*)$', '--profile \\1') | join(' ') }}"

- name: Générer les certificats SSL Wazuh (une seule fois)
  ansible.builtin.command:
    cmd: docker compose -f generate-certs.yml run --rm generator
    chdir: "{{ minisoc_dir }}/docker"
    creates: "{{ minisoc_dir }}/docker/wazuh/config/certs/root-ca.pem"
  when: "'siem' in soc_profiles"

# Les hashes bcrypt de internal_users.yml doivent correspondre aux mots de
# passe générés dans le .env, sinon filebeat (manager) et le dashboard ne
# peuvent pas s'authentifier auprès de l'indexer.
- name: Calculer le hash bcrypt du mot de passe admin de l'indexer
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -e
      - JAVA_HOME=/usr/share/wazuh-indexer/jdk
      - wazuh/wazuh-indexer:4.14.0
      - bash
      - /usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh
      - -p
      - "{{ indexer_password }}"
  register: indexer_hash
  changed_when: false
  no_log: true
  when: "'siem' in soc_profiles"

- name: Calculer le hash bcrypt du mot de passe kibanaserver
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -e
      - JAVA_HOME=/usr/share/wazuh-indexer/jdk
      - wazuh/wazuh-indexer:4.14.0
      - bash
      - /usr/share/wazuh-indexer/plugins/opensearch-security/tools/hash.sh
      - -p
      - "{{ dashboard_password }}"
  register: dashboard_hash
  changed_when: false
  no_log: true
  when: "'siem' in soc_profiles"

- name: Écrire internal_users.yml avec les hashes des mots de passe du .env
  ansible.builtin.copy:
    dest: "{{ minisoc_dir }}/docker/wazuh/config/wazuh_indexer/internal_users.yml"
    mode: "0644"
    content: |
      ---
      # Généré par Ansible à partir des mots de passe du .env — ne pas éditer.
      _meta:
        type: "internalusers"
        config_version: 2

      admin:
        hash: "{{ indexer_hash.stdout_lines[-1] }}"
        reserved: true
        backend_roles:
          - "admin"
        description: "Admin user — Mini-SOC"

      kibanaserver:
        hash: "{{ dashboard_hash.stdout_lines[-1] }}"
        reserved: true
        description: "Wazuh dashboard server user"
  no_log: true
  when: "'siem' in soc_profiles"

- name: Démarrer la stack Mini-SOC ({{ profile_args }})
  ansible.builtin.command:
    cmd: "docker compose {{ profile_args }} up -d"
    chdir: "{{ minisoc_dir }}/docker"
  register: compose_up
  changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr"

# Wrapper exécutable de l'intégration custom-minisoc (le .py est monté en RO
# par compose ; seul le wrapper créé ici peut être chmod/chown). Redémarrage
# du manager uniquement si le wrapper vient d'être créé — jamais sur un run
# de routine, sinon authd est coupé au moment où l'agent s'enrôle.
- name: Installer le wrapper d'intégration custom-minisoc dans le manager
  ansible.builtin.shell: |
    docker exec minisoc-wazuh-manager sh -c '
      test -x /var/ossec/integrations/custom-minisoc && exit 9
      printf "#!/bin/sh\nexec /var/ossec/framework/python/bin/python3 /var/ossec/integrations/custom-minisoc.py \"$@\"\n" > /var/ossec/integrations/custom-minisoc &&
      chmod 750 /var/ossec/integrations/custom-minisoc &&
      chown root:wazuh /var/ossec/integrations/custom-minisoc'
  register: integ_wrapper
  changed_when: integ_wrapper.rc == 0
  failed_when: integ_wrapper.rc not in [0, 9]
  when: "'siem' in soc_profiles"

- name: Redémarrer le manager si le wrapper vient d'être créé
  ansible.builtin.command: docker restart minisoc-wazuh-manager
  when:
    - "'siem' in soc_profiles"
    - integ_wrapper is changed

# Une règle/config invalide fait avorter tout `wazuh-control start` (aucun
# démon ne tourne, y compris authd). On valide ici pour échouer avec l'erreur
# réelle plutôt qu'un obscur échec d'enrôlement côté agent.
- name: Vérifier la configuration Wazuh du manager (règles/décodeurs)
  ansible.builtin.command:
    cmd: docker exec minisoc-wazuh-manager /var/ossec/bin/wazuh-analysisd -t
  register: wazuh_cfg_test
  changed_when: false
  retries: 12
  delay: 5
  until: wazuh_cfg_test.rc == 0
  when: "'siem' in soc_profiles"

- name: Récapitulatif d'accès
  ansible.builtin.debug:
    msg:
      - "Dashboard Mini-SOC : http://{{ ansible_facts['default_ipv4']['address'] | default('localhost') }}:5000"
      - "Grafana            : http://{{ ansible_facts['default_ipv4']['address'] | default('localhost') }}:3000"
      - "Wazuh dashboard    : https://{{ ansible_facts['default_ipv4']['address'] | default('localhost') }}:5601"
      - "Secrets dans {{ minisoc_dir }}/docker/.env"
      - "Moteur Python : sudo systemctl start minisoc"
