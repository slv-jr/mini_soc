---
- name: Créer l'arborescence Mini-SOC
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ minisoc_user }}"
    mode: "0755"
  loop:
    - "{{ minisoc_dir }}"
    - "{{ minisoc_dir }}/data"
    - "{{ minisoc_dir }}/data/geoip"
    - "{{ minisoc_dir }}/logs"

- name: Synchroniser le code source vers {{ minisoc_dir }}
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../"
    dest: "{{ minisoc_dir }}/"
    delete: false
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.venv"
      - "--exclude=data"
      - "--exclude=logs"
      - "--exclude=__pycache__"
      - "--exclude=.env"

- name: Créer le virtualenv et installer les dépendances Python
  ansible.builtin.pip:
    requirements: "{{ minisoc_dir }}/requirements.txt"
    virtualenv: "{{ minisoc_dir }}/venv"
    virtualenv_command: python3 -m venv

- name: Vérifier la présence du fichier .env
  ansible.builtin.stat:
    path: "{{ minisoc_dir }}/docker/.env"
  register: env_stat

- name: Lire le .env existant (pour préserver les secrets déjà générés)
  ansible.builtin.slurp:
    src: "{{ minisoc_dir }}/docker/.env"
  register: env_slurp
  when: env_stat.stat.exists

- name: Indexer les valeurs existantes du .env (clé -> valeur)
  ansible.builtin.set_fact:
    env_existing: "{{ env_existing | default({}) | combine({ (item.split('=', 1)[0] | trim): item.split('=', 1)[1] }) }}"
  loop: "{{ (env_slurp.content | b64decode).splitlines() }}"
  loop_control:
    label: "{{ item.split('=', 1)[0] | trim }}"
  when:
    - env_stat.stat.exists
    - "'=' in item"
    - not (item | trim).startswith('#')

# Secrets : réutilise la valeur existante si présente, sinon en génère une.
# -> le .env peut être régénéré à chaque run (nouvelles variables ajoutées)
#    sans casser les mots de passe déjà enregistrés dans Influx/Grafana/Wazuh.
- name: Déterminer les secrets de la stack
  ansible.builtin.set_fact:
    influx_password: "{{ _e.INFLUXDB_PASSWORD | default(lookup('password', '/dev/null length=24 chars=ascii_letters,digits'), true) }}"
    influx_token: "{{ _e.INFLUXDB_TOKEN | default(lookup('password', '/dev/null length=40 chars=ascii_letters,digits'), true) }}"
    grafana_password: "{{ _e.GRAFANA_PASSWORD | default(lookup('password', '/dev/null length=20 chars=ascii_letters,digits'), true) }}"
    wazuh_api_password: "{{ _e.WAZUH_API_PASSWORD | default(lookup('password', '/dev/null length=20 chars=ascii_letters,digits') ~ 'A1', true) }}"
    indexer_password: "{{ _e.INDEXER_PASSWORD | default(lookup('password', '/dev/null length=20 chars=ascii_letters,digits') ~ 'A1', true) }}"
    dashboard_password: "{{ _e.DASHBOARD_PASSWORD | default(lookup('password', '/dev/null length=20 chars=ascii_letters,digits') ~ 'A1', true) }}"
    minisoc_api_token: "{{ _e.MINISOC_API_TOKEN | default(lookup('password', '/dev/null length=40 chars=ascii_letters,digits'), true) }}"
  vars:
    _e: "{{ env_existing | default({}) }}"

- name: Écrire le fichier .env de la stack Docker (secrets préservés, variables à jour)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ minisoc_dir }}/docker/.env"
    owner: "{{ minisoc_user }}"
    mode: "0600"

- name: Télécharger la base GeoLite2-City (si clé MaxMind fournie)
  ansible.builtin.get_url:
    url: "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key={{ maxmind_license_key }}&suffix=tar.gz"
    dest: /tmp/geolite2.tar.gz
    mode: "0644"
  when: maxmind_license_key | length > 0
  register: geoip_dl
  ignore_errors: true

- name: Extraire la base GeoIP
  ansible.builtin.shell: >
    tar -xzf /tmp/geolite2.tar.gz -C /tmp &&
    find /tmp -name 'GeoLite2-City.mmdb' -exec cp {} {{ minisoc_dir }}/data/geoip/ \;
  args:
    creates: "{{ minisoc_dir }}/data/geoip/GeoLite2-City.mmdb"
  when: maxmind_license_key | length > 0 and geoip_dl is succeeded

- name: Installer le service systemd minisoc
  ansible.builtin.copy:
    src: "{{ minisoc_dir }}/minisoc.service"
    dest: /etc/systemd/system/minisoc.service
    remote_src: true
    mode: "0644"

- name: Recharger systemd et activer le service
  ansible.builtin.systemd:
    name: minisoc
    daemon_reload: true
    enabled: true
