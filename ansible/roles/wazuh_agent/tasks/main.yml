---
- name: Nettoyer l'ancienne configuration du dépôt Wazuh (keyring invalide)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/wazuh.gpg
    - /etc/apt/keyrings/wazuh.gpg.key
    - /etc/apt/sources.list.d/wazuh.list

- name: Installer python3-debian (requis par deb822_repository)
  ansible.builtin.apt:
    name: python3-debian
    state: present

- name: Ajouter le dépôt APT Wazuh (format deb822, clé gérée automatiquement)
  ansible.builtin.deb822_repository:
    name: wazuh
    types: deb
    uris: https://packages.wazuh.com/4.x/apt/
    suites: stable
    components: main
    signed_by: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    state: present

- name: Installer l'agent Wazuh
  ansible.builtin.apt:
    name: "wazuh-agent={{ wazuh_agent_version }}"
    state: present
    update_cache: true
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_ip }}"

- name: Déployer la configuration de l'agent
  ansible.builtin.copy:
    src: "{{ minisoc_dir }}/docker/wazuh/agent/ossec-agent.conf"
    dest: /var/ossec/etc/ossec.conf
    remote_src: true
    mode: "0640"
  notify: restart wazuh-agent

- name: Renseigner l'adresse du manager dans la config de l'agent
  ansible.builtin.replace:
    path: /var/ossec/etc/ossec.conf
    regexp: "MANAGER_IP"
    replace: "{{ wazuh_manager_ip }}"
  notify: restart wazuh-agent

- name: Attendre que le port d'enrôlement du manager (1515) réponde
  ansible.builtin.wait_for:
    host: "{{ wazuh_manager_ip }}"
    port: 1515
    timeout: 120
  register: wazuh_enroll_port
  ignore_errors: true

- name: Enregistrer l'agent auprès du manager (idempotent)
  ansible.builtin.shell: >
    /var/ossec/bin/agent-auth -m {{ wazuh_manager_ip }} -p 1515
  args:
    creates: /var/ossec/etc/client.keys
  when: wazuh_enroll_port is succeeded
  ignore_errors: true

- name: Activer l'agent Wazuh au démarrage
  ansible.builtin.systemd:
    name: wazuh-agent
    enabled: true

- name: Démarrer l'agent Wazuh (tolère un manager pas encore prêt — retry auto)
  ansible.builtin.systemd:
    name: wazuh-agent
    state: started
  register: wazuh_agent_start
  retries: 3
  delay: 10
  until: wazuh_agent_start is succeeded
  ignore_errors: true

- name: Avertir si l'agent n'a pas démarré (le manager conteneurisé finit de s'initialiser)
  ansible.builtin.debug:
    msg: >-
      L'agent Wazuh n'a pas démarré immédiatement. C'est normal si le manager
      conteneurisé finit de s'initialiser : systemd le relancera (Restart=on-failure)
      dès que le manager acceptera les connexions. Vérifier avec
      'systemctl status wazuh-agent' puis 'journalctl -u wazuh-agent'.
  when: wazuh_agent_start is failed
