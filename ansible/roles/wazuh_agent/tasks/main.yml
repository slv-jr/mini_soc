---
# Agent Wazuh sur l'hôte. L'enrôlement est automatique : le bloc <enrollment>
# de la config fait que l'agent demande sa clé au manager (1515) au démarrage
# et retente tout seul tant que le manager n'est pas prêt. Aucun agent-auth
# manuel, aucune attente de port ici.

- name: Installer python3-debian (requis par deb822_repository)
  ansible.builtin.apt:
    name: python3-debian
    state: present

- name: Ajouter le dépôt APT Wazuh (deb822, clé gérée automatiquement)
  ansible.builtin.deb822_repository:
    name: wazuh
    types: deb
    uris: https://packages.wazuh.com/4.x/apt/
    suites: stable
    components: main
    signed_by: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    state: present

- name: Installer l'agent Wazuh (version alignée sur le manager)
  ansible.builtin.apt:
    name: "wazuh-agent={{ wazuh_agent_version }}"
    state: present
    update_cache: true
    allow_downgrade: true
  notify: restart wazuh-agent

- name: Déployer la configuration de l'agent
  ansible.builtin.copy:
    src: "{{ minisoc_dir }}/docker/wazuh/agent/ossec-agent.conf"
    dest: /var/ossec/etc/ossec.conf
    remote_src: true
    owner: root
    group: wazuh
    mode: "0640"
  notify: restart wazuh-agent

- name: Renseigner l'adresse du manager dans la config de l'agent
  ansible.builtin.replace:
    path: /var/ossec/etc/ossec.conf
    regexp: "MANAGER_IP"
    replace: "{{ wazuh_manager_ip }}"
  notify: restart wazuh-agent

- name: Activer et démarrer l'agent Wazuh
  ansible.builtin.systemd:
    name: wazuh-agent
    enabled: true
    state: started
