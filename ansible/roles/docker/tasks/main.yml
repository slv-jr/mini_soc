---
- name: Installer les prérequis du dépôt Docker
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present

- name: Créer le répertoire des clés APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Ajouter la clé GPG Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Ajouter le dépôt Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Installer Docker Engine + plugin compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Activer et démarrer Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ajouter l'utilisateur au groupe docker
  ansible.builtin.user:
    name: "{{ minisoc_user }}"
    groups: docker
    append: true
