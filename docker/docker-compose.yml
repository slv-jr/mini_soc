# ============================================================
# Mini-SOC — stack complète
# Profils (active la consommation RAM par paliers) :
#   (aucun)   -> core : redis + influxdb + grafana          (~0.5 Go)
#   sensors   -> + suricata + zeek + vector                 (~1 Go)
#   siem      -> + wazuh manager/indexer/dashboard           (~3 Go)
#   lab       -> + dvwa + juice-shop (réseau isolé)          (~0.5 Go)
#
# Exemples :
#   docker compose up -d                                  # core seul
#   docker compose --profile sensors up -d                # core + capteurs
#   docker compose --profile sensors --profile siem up -d # SOC complet
#   COMPOSE_PROFILES=sensors,siem,lab docker compose up -d
# ============================================================

name: mini-soc

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── CORE : bus de messages ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: minisoc-redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [soc-net]

  # ── CORE : métriques time-series ────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: minisoc-influxdb
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:?influx password requis}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-minisoc}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-network_metrics}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:?influx token requis}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [soc-net]

  # ── CORE : visualisation métriques ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: minisoc-grafana
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?grafana password requis}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - GF_INFLUXDB_ORG=${INFLUXDB_ORG:-minisoc}
      - GF_INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-network_metrics}
    depends_on:
      influxdb:
        condition: service_healthy
    networks: [soc-net]

  # ── SENSORS : IDS Suricata ──────────────────────────────────────────────────
  # network_mode host : nécessaire pour voir le trafic réel de l'interface.
  suricata:
    image: jasonish/suricata:7.0
    container_name: minisoc-suricata
    restart: unless-stopped
    profiles: [sensors]
    logging: *default-logging
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/var/lib/suricata/rules
      - suricata_logs:/var/log/suricata
    command: -i ${SOC_IFACE:-eth0}
    environment:
      - SOC_IFACE=${SOC_IFACE:-eth0}

  # ── SENSORS : analyse protocolaire Zeek ─────────────────────────────────────
  zeek:
    image: zeek/zeek:6.0
    container_name: minisoc-zeek
    restart: unless-stopped
    profiles: [sensors]
    logging: *default-logging
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - ./zeek/scripts:/usr/local/zeek/share/zeek/site/mini-soc:ro
      - zeek_logs:/usr/local/zeek/logs
    working_dir: /usr/local/zeek/logs
    command: >
      zeek -i ${SOC_IFACE:-eth0}
      LogAscii::use_json=T
      /usr/local/zeek/share/zeek/site/local.zeek

  # ── SENSORS : pipeline d'ingestion Vector ───────────────────────────────────
  vector:
    image: timberio/vector:0.39.0-alpine
    container_name: minisoc-vector
    restart: unless-stopped
    profiles: [sensors]
    logging: *default-logging
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - suricata_logs:/var/log/suricata:ro
      - zeek_logs:/var/log/zeek:ro
    environment:
      - SOC_IFACE=${SOC_IFACE:-eth0}
    depends_on:
      redis:
        condition: service_healthy
    networks: [soc-net]

  # ── SIEM : Wazuh indexer (OpenSearch) ───────────────────────────────────────
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.9.0
    container_name: minisoc-wazuh-indexer
    restart: unless-stopped
    profiles: [siem]
    logging: *default-logging
    hostname: wazuh.indexer
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    environment:
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./wazuh/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./wazuh/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml:ro
      - ./wazuh/config/certs:/usr/share/wazuh-indexer/certs:ro
    networks: [soc-net]

  # ── SIEM : Wazuh manager ────────────────────────────────────────────────────
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.0
    container_name: minisoc-wazuh-manager
    restart: unless-stopped
    profiles: [siem]
    logging: *default-logging
    hostname: wazuh.manager
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 655360, hard: 655360 }
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=${INDEXER_USERNAME:-admin}
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:?indexer password requis}
      - API_USERNAME=${WAZUH_API_USERNAME:-wazuh-wui}
      - API_PASSWORD=${WAZUH_API_PASSWORD:?wazuh api password requis}
      # Transmis à l'intégration custom-minisoc pour authentifier le webhook.
      - MINISOC_API_TOKEN=${MINISOC_API_TOKEN:-}
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - ./wazuh/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
      - ./wazuh/custom-rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml
      - ./wazuh/active-response/block-ip.sh:/var/ossec/active-response/bin/block-ip.sh
      - ./wazuh/integrations/custom-minisoc.py:/var/ossec/integrations/custom-minisoc.py:ro
      - ./wazuh/config/certs:/etc/ssl/certs/wazuh:ro
      # Ingestion directe des alertes Suricata par Wazuh (localfile dans ossec.conf).
      - suricata_logs:/var/log/suricata:ro
    # Permet au conteneur d'atteindre le dashboard Flask du Mini-SOC sur l'hôte
    # (boucle de feedback Wazuh -> /api/wazuh-event).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - wazuh.indexer
    networks: [soc-net]

  # ── SIEM : Wazuh dashboard ──────────────────────────────────────────────────
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    container_name: minisoc-wazuh-dashboard
    restart: unless-stopped
    profiles: [siem]
    logging: *default-logging
    hostname: wazuh.dashboard
    ports:
      - "5601:5601"
    environment:
      - INDEXER_USERNAME=${INDEXER_USERNAME:-admin}
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:?indexer password requis}
      - WAZUH_API_URL=https://wazuh.manager
      - API_USERNAME=${WAZUH_API_USERNAME:-wazuh-wui}
      - API_PASSWORD=${WAZUH_API_PASSWORD:?wazuh api password requis}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-kibanaserver}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:?dashboard password requis}
    volumes:
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - ./wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./wazuh/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - ./wazuh/config/certs:/usr/share/wazuh-dashboard/certs:ro
    depends_on:
      - wazuh.indexer
    networks: [soc-net]

  # ── LAB : cibles d'attaque (réseau ISOLÉ) ───────────────────────────────────
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: minisoc-dvwa
    restart: unless-stopped
    profiles: [lab]
    logging: *default-logging
    ports:
      - "8081:80"
    networks: [lab-net]

  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: minisoc-juice-shop
    restart: unless-stopped
    profiles: [lab]
    logging: *default-logging
    ports:
      - "8082:3000"
    networks: [lab-net]

volumes:
  redis_data:
  influx_data:
  grafana_data:
  suricata_logs:
  zeek_logs:
  wazuh_indexer_data:
  wazuh_manager_data:
  wazuh_dashboard_config:

networks:
  soc-net:
    driver: bridge
  # Réseau isolé pour le lab : pas de route vers le LAN réel, on attaque depuis l'hôte.
  lab-net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.30.0.0/24
