<!--
  Mini-SOC — configuration du manager Wazuh (ossec.conf).
  Points clés Mini-SOC :
    - ingestion directe des alertes Suricata (eve.json) via <localfile>
    - commande d'active-response "block-ip" (nftables) déclenchée sur règles HIGH
-->
<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <update_check>no</update_check>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Connexion à l'indexer (renseignée aussi via variables d'env de l'image) -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh.indexer:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/certs/wazuh/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/certs/wazuh/wazuh.manager.pem</certificate>
      <key>/etc/ssl/certs/wazuh/wazuh.manager-key.pem</key>
    </ssl>
  </indexer>

  <!-- Réception syslog distante (équipements réseau) -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>0.0.0.0/0</allowed-ips>
  </remote>

  <!-- Connexion des agents -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
  </remote>

  <!-- ── Ingestion des alertes Suricata (volume monté en RO) ── -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>

  <!-- ── Active response : blocage nftables via notre script ── -->
  <command>
    <name>minisoc-block-ip</name>
    <executable>block-ip.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>minisoc-block-ip</command>
    <location>local</location>
    <!-- Se déclenche sur les règles de niveau >= 10 (HIGH/CRITICAL) -->
    <level>10</level>
    <timeout>3600</timeout>
  </active-response>

  <!-- ── Boucle de feedback : pousse les alertes vers le webhook du Mini-SOC ── -->
  <!-- (le script custom-minisoc est installé par Ansible, voir phase 8) -->
  <integration>
    <name>custom-minisoc</name>
    <hook_url>http://host.docker.internal:5000/api/wazuh-event</hook_url>
    <level>10</level>
    <alert_format>json</alert_format>
  </integration>

  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <rule_test>
    <enabled>yes</enabled>
    <threads>1</threads>
    <max_sessions>64</max_sessions>
    <session_timeout>15m</session_timeout>
  </rule_test>

  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>etc/sslmanager.cert</ssl_manager_cert>
    <ssl_manager_key>etc/sslmanager.key</ssl_manager_key>
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
  </auth>

  <cluster>
    <name>wazuh</name>
    <node_name>master</node_name>
    <node_type>master</node_type>
    <key></key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>wazuh.manager</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>
</ossec_config>
