<!--
  Mini-SOC — configuration de l'agent Wazuh installé sur l'HÔTE Ubuntu.
  Déployé par le playbook Ansible (phase 8) vers /var/ossec/etc/ossec.conf.
  Collecte : logs d'authentification, syslog, FIM sur les répertoires sensibles.
  Le placeholder MANAGER_IP est remplacé par Ansible (souvent 127.0.0.1, le
  manager tournant en conteneur sur le même hôte avec les ports exposés).
-->
<ossec_config>
  <client>
    <server>
      <address>MANAGER_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <crypto_method>aes</crypto_method>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <!-- Enrôlement automatique : l'agent demande lui-même sa clé au manager
         (port 1515) au démarrage et retente tant qu'il n'est pas prêt.
         Remplace tout agent-auth manuel côté Ansible. -->
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>MANAGER_IP</manager_address>
      <port>1515</port>
    </enrollment>
  </client>

  <!-- ── Journaux d'authentification (brute force SSH, sudo...) ── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
  </localfile>

  <!-- ── Surveillance d'intégrité de fichiers (FIM) ── -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" realtime="yes">/etc,/opt/mini-soc/config</directories>
    <directories check_all="yes" realtime="yes">/usr/bin,/usr/sbin,/bin,/sbin</directories>
    <directories check_all="yes" realtime="yes">/home</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <nodiff>/etc/ssl/private.key</nodiff>
  </syscheck>

  <!-- ── Détection de rootkits / anomalies système ── -->
  <rootcheck>
    <disabled>no</disabled>
    <check_unixaudit>yes</check_unixaudit>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
  </rootcheck>

  <!-- Inventaire système (réseau, ports, paquets) -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <network>yes</network>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>
</ossec_config>
